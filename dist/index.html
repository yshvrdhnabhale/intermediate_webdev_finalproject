<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Interest Rate Calculator</title><meta name="description" content="Calculate simple and compound interest with our free Interest Rate Calculator."/><link rel="icon" type="image/png" href="images/favicon.png"/><link rel="stylesheet" href="style.css"/><script defer="defer" src="main.js"></script></head><body><h1>Interest Rate Calculator</h1><div class="calculator"><div class="form-group"><label for="principal">Principal Amount</label> <input type="number" id="principal" placeholder="e.g. 1000"/></div><div class="form-group"><label for="rate">Annual Interest Rate</label> <input type="number" id="rate" placeholder="e.g. 5"/></div><div class="form-group"><label for="time">Time Period in years</label> <input type="number" id="time" placeholder="e.g. 3"/></div><div class="form-group"><label for="type">Interest Type</label> <select id="type"><option value="simple">Simple Interest</option><option value="compound">Compound Interest</option></select></div><button onclick="calculateInterest()">Calculate</button><div class="result" id="result"></div></div></body></html>
