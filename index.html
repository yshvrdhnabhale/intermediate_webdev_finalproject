* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}
h1 { color: white; font-size: 2rem; margin-bottom: 30px; }
.calculator {
  background: white;
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.form-group { margin-bottom: 20px; }
label { display: block; font-weight: 600; color: #555; margin-bottom: 6px; }
input, select {
  width: 100%; padding: 12px 16px;
  border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem;
}
input:focus, select:focus { outline: none; border-color: #667eea; }
button {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white; font-size: 1rem; font-weight: 600;
  border: none; border-radius: 8px; cursor: pointer;
}
.result {
  margin-top: 24px; padding: 20px;
  background: #f0f4ff; border-radius: 8px;
  display: none; line-height: 1.8;
}
.result.show { display: block; }
.result strong { color: #667eea; font-size: 1.2rem; }
